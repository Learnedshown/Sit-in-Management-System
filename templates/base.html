<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>{%block title %} Document {% endblock %}</title>
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
</head>
<body>

   <nav class="navbar navbar-expand-sm navbar-dark fw-bold bg-primary">
        <div class="container">
             <a class="navbar-brand" href="#">College of Computer Studies</a>

             <button class="navbar-toggler" 
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

            </button>

            <ul class="navbar-nav ms-auto pe-4 collapse navbar-collapse" id="navbarNav">
                    <li class="ms-auto">
                        <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">Community</a>

                                <ul class="dropdown-menu dropdown-menu-dark fw-bold bg-primary">
                                    <li><a class="dropdown-item" href="#">Forums / Discussion Boards</a></li>
                                    <li><a class="dropdown-item" href="#">Chat / Discord link</a></li>  
                                    <li><a class="dropdown-item" href="#">Q&A</a></li>         
                                </ul>
                            </li>
                    
                            <li class="nav-item">
                                <a class="nav-link px-3" href="#">About</a>
                            </li>
                    
                    
                            <li class="nav-item">
                                <a class="nav-link px-3" href="/login">Login</a>
                            </li>
                        
                            <li class="nav-item">
                                <a class="nav-link px-3" href="/register">Register</a>
                            </li>
                    </li> 
            </ul>  
                    
         </div>
    </nav>



	 <!-- Main content -->
    <div class="container my-5">
        {% block content %}
       
        {% endblock %}
    </div>

</body>
</html>
