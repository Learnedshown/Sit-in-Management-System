{% extends "base.html" %}

{% block title %} Login {% endblock %}

{% block content %}


 <div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh;">
  
    <div class="mb-3">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="Logo" style="width: 250px; height: auto;">
    </div>

    <div class="card sm-4 p-4 d-flex justify-content-end form-col">
        <form method="POST">
              <h3 class="text-center mb-4 fw-bold navbar-dark">Login</h3>
            <div class="mb-3" style="width: 100%; max-width: 350px;"> 
                <input id="id_number" type="text" class="form-control form-control-lg" name="id_number" placeholder="Enter a Valid ID number" required>
                <label for="id_number" class="visually-hidden">ID Number</label>
            </div>
            
            <div class="mb-3">
                <input id="password" type="password" class="form-control form-control-lg" name="password" placeholder="Enter password" required>
                <label for="password" class="visually-hidden">ID Number</label>
            </div>

            <div class="mb-3 form-check">
                <input class="form-check-input me-2" type="checkbox" value="on" id="remember" name="remember">
                <label class="form-check-label mb-0" for="remember">Remember Me</label>
                <a href="#" class="text-decoration-none ps-5">Forgot Password?</a>
            </div>
            
         
            <button type="submit" class="btn btn-primary w-100 mb-2">Login</button>
           

            <p class="text-center mb-0">Don't have an account? <a href="/register" class="fw-bold">Register</a></p>
        
        </form>
    </div>
   
 </div>


{% endblock %}
