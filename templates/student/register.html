{% extends "student/base.html" %}

{% block title %} Register {% endblock %}

{% block content %}
<div class="d-flex flex-column justify-content-center align-items-center" style="min-height: 80vh;">
      {% with messages = get_flashed_messages() %}
  {% if messages %}
    <div class="alert alert-warning">
      {% for message in messages %}
        <div>{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
  <div class="card p-4 shadow" style="width: 100%; max-width: 600px;">
    <form method="POST">
      <h3 class="text-center mb-4 fw-bold navbar-dark">Sign Up</h3>

      <!-- ID Number -->
      <div class="row">
        <div class="col-12 mb-3">
          <input type="text" class="form-control" name="id_number" placeholder="ID Number" value="{{ id_number|default('') }}" required maxlength="8">
        </div>
      </div>

      <!-- First & Last Name -->
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <input type="text" class="form-control" name="first_name" placeholder="First Name" maxlength="30" value="{{ first_name|default('') }}" required>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <input type="text" class="form-control" name="last_name" placeholder="Last Name" maxlength="30" value="{{ last_name|default('') }}" required>
        </div>
      </div>

      <!-- Middle Name -->
      <div class="row">
        <div class="col-12 mb-3">
          <input type="text" class="form-control" name="middle_name" placeholder="Middle Name" maxlength="30" value="{{ middle_name|default('') }}">
        </div>
      </div>

      <!-- Password & Confirm Password -->
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <input type="password" class="form-control" name="password" placeholder="Password" required>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <input type="password" class="form-control" name="confirm_password" placeholder="Confirm Password" required>
        </div>
      </div>

      <!-- Email -->
      <div class="row">
        <div class="col-12 mb-3">
          <input type="email" class="form-control" name="email" placeholder="Email" value="{{ email|default('') }}" required>
        </div>
      </div>

      <!-- Course Level & Course -->
      <div class="row">
        <div class="col-12 col-md-6 mb-3">
          <select class="form-select" name="course_level" required>
            <option value="" disabled {% if not course_level %}selected{% endif %}>Select Level</option>
            <option value="1" {% if course_level == '1' %}selected{% endif %}>1</option>
            <option value="2" {% if course_level == '2' %}selected{% endif %}>2</option>
            <option value="3" {% if course_level == '3' %}selected{% endif %}>3</option>
            <option value="4" {% if course_level == '4' %}selected{% endif %}>4</option>
          </select>
        </div>
        <div class="col-12 col-md-6 mb-3">
          <select class="form-select" name="course" required>
            <option value="" disabled {% if not course %}selected{% endif %}>Select Course</option>
            <option value="BSIT" {% if course == "BSIT" %}selected{% endif %}>BSIT</option>
            <option value="BSCS" {% if course == "BSCS" %}selected{% endif %}>BSCS</option>
          </select>
        </div>
      </div>

      <!-- Address -->
      <div class="row">
        <div class="col-12 mb-3">
          <input type="text" class="form-control" name="address" placeholder="Address" value="{{ address|default('') }}" required>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn btn-primary w-100 mb-2">Register</button>

      <!-- Back to Login -->
      <p class="text-center mb-0">
        <a href="/">Back to Login</a>
      </p>
    </form>
  </div>
</div>


{% endblock %}
