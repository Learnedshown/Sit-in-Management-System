<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Document{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>
  <style>
    body {
      font-family: 'Inter', 'Segoe UI', sans-serif;
      background: #f4f5f9;
    }

    /* ── Navbar ── */
    .main-navbar {
      background: linear-gradient(135deg, #2d1170 0%, #4a1fa8 50%, #6a35b5 100%);
      padding: 0.6rem 0;
      box-shadow: 0 2px 16px rgba(61,26,142,0.25);
    }

    .main-navbar .navbar-brand {
      color: #fff !important;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .main-navbar .navbar-brand .brand-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }

    .main-navbar .nav-link {
      color: rgba(255,255,255,0.85) !important;
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.45rem 0.85rem !important;
      border-radius: 7px;
      transition: background 0.2s, color 0.2s;
    }

    .main-navbar .nav-link:hover {
      color: #fff !important;
      background: rgba(255,255,255,0.12);
    }

    .main-navbar .nav-link.active-link {
      color: #fff !important;
      background: rgba(255,255,255,0.18);
    }

    .main-navbar .dropdown-menu {
      border: none;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(61,26,142,0.18);
      padding: 0.4rem;
      min-width: 200px;
      margin-top: 6px;
    }

    .main-navbar .dropdown-item {
      border-radius: 7px;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.5rem 0.85rem;
      color: #2d1170;
      transition: background 0.15s;
    }

    .main-navbar .dropdown-item:hover {
      background: #eee8ff;
      color: #4a1fa8;
    }

    .navbar-btn-group {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .btn-nav-login {
      background: rgba(255,255,255,0.15);
      color: #fff !important;
      border: 1.5px solid rgba(255,255,255,0.3);
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      padding: 0.38rem 1rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .btn-nav-login:hover {
      background: rgba(255,255,255,0.25);
      border-color: rgba(255,255,255,0.5);
    }

    .btn-nav-register {
      background: #f5c842;
      color: #2d1170 !important;
      border: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 700;
      padding: 0.38rem 1rem;
      text-decoration: none;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(245,200,66,0.3);
    }

    .btn-nav-register:hover {
      background: #f7d44e;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(245,200,66,0.4);
    }

    .gold-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #f5c842;
      display: inline-block;
      margin-right: 8px;
    }

    /* ── Page content ── */
    .page-body {
      padding: 2rem 0;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg main-navbar">
  <div class="container">
    <a class="navbar-brand" href="#">
      <span class="brand-icon">🎓</span>
      College of Computer Studies
    </a>

    <button class="navbar-toggler border-0" type="button"
            data-bs-toggle="collapse" data-bs-target="#navbarNav"
            aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto align-items-center gap-1 pe-2">

        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
            <span class="gold-dot"></span>Community
          </a>
          <ul class="dropdown-menu">
            <li><a class="dropdown-item" href="#">
              💬 Forums / Discussion Boards
            </a></li>
            <li><a class="dropdown-item" href="#">
              🔗 Chat / Discord
            </a></li>
            <li><a class="dropdown-item" href="#">
              ❓ Q&amp;A
            </a></li>
          </ul>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="#">About</a>
        </li>

        <li class="nav-item ms-2">
          <div class="navbar-btn-group">
            <a href="/login" class="btn-nav-login">Login</a>
            <a href="/register" class="btn-nav-register">Register</a>
          </div>
        </li>

      </ul>
    </div>
  </div>
</nav>

<div class="container page-body">
  {% block content %}
  {% endblock %}
</div>

</body>
</html>
