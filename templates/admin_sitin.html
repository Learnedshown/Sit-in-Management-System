{% extends "admin_base.html" %}

{% block content %}

<h2 class="text-center mb-4">Sit In Form</h2>

<div class="card shadow-sm mx-auto" style="max-width: 500px;">
    <div class="card-body">

        <div class="mb-2">
            <label>ID Number</label>
            <input type="text" id="id_number" class="form-control" onkeyup="fetchStudent()">
        </div>

        <div class="mb-2">
            <label>Student Name</label>
            <input type="text" id="student_name" class="form-control" readonly>
        </div>

        <div class="mb-2">
            <label>Purpose</label>
            <input type="text" id="purpose" class="form-control">
        </div>

        <div class="mb-2">
            <label>PC Number</label>
            <input type="text" id="pc_number" class="form-control">
        </div>

        <div class="mb-2">
            <label>Lab</label>
            <input type="text" id="lab_room" class="form-control">
        </div>

        <div class="mb-3">
            <label>Remaining Session</label>
            <input type="text" id="sessions" class="form-control" readonly>
        </div>

        <div class="d-flex justify-content-between">
            <a href="/admin/dashboard" class="btn btn-secondary">Back</a>
            <button class="btn btn-primary" onclick="startSitIn()">Sit In</button>
        </div>

        <p id="message" class="mt-3 text-center"></p>

    </div>
</div>

<script>
// 🔍 Fetch student info
function fetchStudent() {
    const id = document.getElementById("id_number").value;

    if (id.length < 3) return;

    fetch("/view_student/" + id)
    .then(res => res.json())
    .then(data => {
        if (!data.error) {
            document.getElementById("student_name").value =
                data.first_name + " " + data.last_name;

            document.getElementById("sessions").value =
                data.sessions_remaining;
        } else {
            document.getElementById("student_name").value = "";
            document.getElementById("sessions").value = "";
        }
    });
}

// ▶ Start sit-in
function startSitIn() {
    fetch("/admin/sitin", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: new URLSearchParams({
            id_number: document.getElementById("id_number").value,
            pc_number: document.getElementById("pc_number").value,
            lab_room: document.getElementById("lab_room").value
        })
    })
    .then(() => {
        document.getElementById("message").innerText = "Sit-in started successfully!";
        document.getElementById("message").classList.add("text-success");

        // Optional: clear fields
        document.getElementById("id_number").value = "";
        document.getElementById("student_name").value = "";
        document.getElementById("sessions").value = "";
        document.getElementById("pc_number").value = "";
        document.getElementById("lab_room").value = "";
    })
    .catch(() => {
        document.getElementById("message").innerText = "Error starting sit-in";
        document.getElementById("message").classList.add("text-danger");
    });
}
</script>

{% endblock %}
