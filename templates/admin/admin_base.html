<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <link rel="stylesheet" href="{{url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{url_for('static', filename='css/style.css') }}">

    <style>
        .navbar-brand,
        .nav-link {
            color: white !important;
        }

        .navbar-brand:hover,
        .nav-link:hover {
            color: blue !important;
        }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="/admin/dashboard">Dashboard</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">

        <li class="nav-item dropdown">
          <!-- ✅ FIXED bootstrap 5 -->
          <a class="nav-link dropdown-toggle text-white" href="#" role="button" data-bs-toggle="dropdown">
            Notification
          </a>
          <div class="dropdown-menu bg-light">
            <div style="overflow-x:auto; max-height:390px; width:20rem;">
            </div>
          </div>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/dashboard">Home</a>
        </li>

        <!-- ✅ FIXED: SEARCH OPENS MODAL -->
        <li class="nav-item">
          <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#searchModal">
            Search
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/students">Students</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/current_sitin">Sit-in</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/sitin/records">View Sit-in Records</a>
        </li>

        <li class="nav-item">
          <a class="btn btn-danger" href="/logout">Log out</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ✅ MAIN CONTENT -->
<div class="container my-5">
    {% block content %}
    {% endblock %}
</div>

<!-- ✅ MODAL (PUT HERE) -->
<div class="modal fade" id="searchModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Sit In Form</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <div class="card shadow-sm mx-auto" style="max-width: 500px;">
          <div class="card-body">

            <div class="mb-2">
              <label>ID Number</label>
              <input type="text" id="id_number" class="form-control" onkeyup="fetchStudent()">
            </div>

            <div class="mb-2">
              <label>Student Name</label>
              <input type="text" id="student_name" class="form-control" readonly>
            </div>

            <div class="mb-2">
            <label>Purpose</label>
            <select id="purpose" class="form-control" required>
              <option value="">-- Select Language --</option>
              <option value="C#">C#</option>
              <option value="C">C</option>
              <option value="Java">Java</option>
              <option value="Python">Python</option>
              <option value="PHP">PHP</option>
            </select>
            </div>

            <div class="mb-2">
              <label>PC Number</label>
              <input type="text" id="pc_number" class="form-control" required>
            </div>

           <div class="mb-2">
            <label>Lab</label>
            <select id="lab_room" class="form-control" required>
              <option value="">-- Select Lab --</option>
              <option value="524">524</option>
              <option value="544">544</option>
              <option value="540">540</option>
              <option value="530">530</option>
            </select>
           </div>

            <div class="mb-3">
              <label>Remaining Session</label>
              <input type="text" id="sessions" class="form-control" readonly>
            </div>

            <div class="d-flex justify-content-between">
              <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
              <button class="btn btn-primary" onclick="startSitIn()">Sit In</button>
            </div>

            <p id="message" class="mt-3 text-center"></p>

          </div>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- ✅ Bootstrap JS (MUST be here) -->
<script src="{{url_for('static', filename='js/bootstrap.bundle.min.js')}}"></script>
<script>
// 🔍 Fetch student info
function fetchStudent() {
    const id = document.getElementById("id_number").value;

    if (id.length < 3) return;

    fetch("/view_student/" + id)
    .then(res => res.json())
    .then(data => {
        if (!data.error) {
            document.getElementById("student_name").value =
                data.first_name + " " + data.last_name;

            document.getElementById("sessions").value =
                data.sessions_remaining;
        } else {
            document.getElementById("student_name").value = "";
            document.getElementById("sessions").value = "";
        }
    });
}
function startSitIn() {

    const id = document.getElementById("id_number").value.trim();
    const purpose = document.getElementById("purpose").value;
    const pc = document.getElementById("pc_number").value.trim();
    const lab = document.getElementById("lab_room").value;

    const msg = document.getElementById("message");

    // 🚨 VALIDATION FIRST
    if (!id || !purpose || !pc || !lab) {
        msg.innerText = "All fields are required!";
        msg.className = "text-danger";
        return; // ⛔ STOP here (no fetch)
    }

    fetch("/admin/sitin", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: new URLSearchParams({
            id_number: id,
            purpose: purpose,
            pc_number: pc,
            lab_room: lab
        })
    })
    .then(res => res.json())
    .then(data => {

        if (data.success) {
            msg.innerText = data.message;
            msg.className = "text-success";

            // clear fields
            document.getElementById("id_number").value = "";
            document.getElementById("student_name").value = "";
            document.getElementById("sessions").value = "";
            document.getElementById("pc_number").value = "";
            document.getElementById("lab_room").value = "";
            document.getElementById("purpose").value = "";

        } else {
            msg.innerText = data.message;
            msg.className = "text-danger";
        }
    })
    .catch(() => {
        msg.innerText = "Server error";
        msg.className = "text-danger";
    });
}
</script>
</body>
</html>
