<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin Dashboard{% endblock %} | CCS Lab</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    <style>
        :root {
            --uc-blue: #144c94;
            --uc-blue-dark: #0d3870;
            --uc-blue-light: #1a5eab;
        }

        body {
            background-color: #f0f4f8;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* ── Top Navbar ── */
        .top-navbar {
            background: linear-gradient(135deg, var(--uc-blue-dark) 0%, var(--uc-blue) 60%, var(--uc-blue-light) 100%);
            box-shadow: 0 2px 12px rgba(20, 76, 148, 0.35);
            position: sticky;
            top: 0;
            z-index: 1030;
            min-height: 60px;
        }

        .top-navbar .navbar-brand {
            font-weight: 700;
            font-size: 1.2rem;
            color: #fff !important;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .top-navbar .navbar-brand .brand-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.15);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        .admin-badge {
            background: rgba(255,255,255,0.18);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 2px 8px;
            border-radius: 20px;
            vertical-align: middle;
        }

        .top-navbar .nav-link {
            color: rgba(255,255,255,0.88) !important;
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.45rem 0.75rem !important;
            border-radius: 6px;
            transition: background 0.18s, color 0.18s;
        }

        .top-navbar .nav-link:hover,
        .top-navbar .nav-link.active {
            color: #fff !important;
            background: rgba(255,255,255,0.15);
        }

        .top-navbar .btn-logout {
            background: rgba(220, 53, 69, 0.85);
            border: none;
            color: #fff;
            font-size: 0.875rem;
            font-weight: 600;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            transition: background 0.18s;
            text-decoration: none;
        }

        .top-navbar .btn-logout:hover {
            background: #c82333;
            color: #fff;
        }

        /* ── Notification dropdown ── */
        .notif-dropdown {
            min-width: 300px;
            border: none;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            border-radius: 10px;
            padding: 0;
            overflow: hidden;
        }

        .notif-dropdown-header {
            background: var(--uc-blue);
            color: #fff;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .notif-dropdown-body {
            max-height: 350px;
            overflow-y: auto;
            padding: 8px 0;
        }

        /* ── Main layout ── */
        .page-wrapper {
            padding: 1.75rem 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .page-header {
            margin-bottom: 1.5rem;
        }

        .page-header h4 {
            color: var(--uc-blue-dark);
            font-weight: 700;
            margin: 0;
        }

        /* ── Cards ── */
        .dash-card {
            border: none;
            border-radius: 14px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.07);
            overflow: hidden;
            height: 100%;
        }

        .dash-card .card-header-custom {
            background: linear-gradient(135deg, var(--uc-blue-dark), var(--uc-blue));
            color: #fff;
            padding: 14px 20px;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dash-card .card-header-custom .header-icon {
            width: 26px;
            height: 26px;
            background: rgba(255,255,255,0.18);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
        }

        .dash-card .card-body {
            padding: 1.25rem 1.5rem;
            background: #fff;
        }

        /* ── Stat tiles ── */
        .stat-tile {
            border-radius: 12px;
            padding: 1rem 1.25rem;
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .stat-tile .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            flex-shrink: 0;
        }

        .stat-tile .stat-value {
            font-size: 1.75rem;
            font-weight: 800;
            line-height: 1;
            color: var(--uc-blue-dark);
        }

        .stat-tile .stat-label {
            font-size: 0.75rem;
            color: #6b7280;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
        }

        /* ── Scrollable areas ── */
        .scroll-area {
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #cdd5e0 transparent;
        }

        .scroll-area::-webkit-scrollbar { width: 5px; }
        .scroll-area::-webkit-scrollbar-track { background: transparent; }
        .scroll-area::-webkit-scrollbar-thumb { background: #cdd5e0; border-radius: 4px; }

        /* ── Modal polish ── */
        .modal-header {
            background: linear-gradient(135deg, var(--uc-blue-dark), var(--uc-blue));
            color: #fff;
            border-radius: 12px 12px 0 0;
        }

        .modal-header .modal-title { font-weight: 700; }
        .modal-header .btn-close { filter: invert(1) brightness(2); }

        .modal-content {
            border: none;
            border-radius: 14px;
            box-shadow: 0 16px 48px rgba(0,0,0,0.18);
        }

        .modal-body { padding: 1.5rem; }

        .form-label-sm {
            font-size: 0.78rem;
            font-weight: 600;
            color: #6b7280;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            margin-bottom: 4px;
        }

        .navbar-toggler { border-color: rgba(255,255,255,0.4); }
        .navbar-toggler-icon { filter: invert(1); }
    </style>
</head>

<body>

<!-- ══════════════ TOP NAVBAR ══════════════ -->
<nav class="navbar navbar-expand-lg top-navbar">
  <div class="container-fluid px-3">

    <a class="navbar-brand" href="/admin/dashboard">
      <div class="brand-icon">&#128187;</div>
      CCS Lab Portal
      <span class="admin-badge">Admin</span>
    </a>

    <button class="navbar-toggler" type="button"
            data-bs-toggle="collapse" data-bs-target="#adminNavbar"
            aria-controls="adminNavbar" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="adminNavbar">
      <ul class="navbar-nav ms-auto align-items-lg-center gap-1">

        <!-- Notification -->
        <li class="nav-item dropdown">
          <a class="nav-link dropdown-toggle" href="#" id="notifDropdown"
             role="button" data-bs-toggle="dropdown" aria-expanded="false">
            &#128276; Notifications
          </a>
          <div class="dropdown-menu notif-dropdown" aria-labelledby="notifDropdown">
            <div class="notif-dropdown-header">Notifications</div>
            <div class="notif-dropdown-body px-3 py-2">
              <p class="text-muted small mb-0">No new notifications.</p>
            </div>
          </div>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/dashboard">&#127968; Home</a>
        </li>

        <!-- Search triggers Sit-in modal -->
        <li class="nav-item">
          <a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#searchModal">
            &#128270; Sit-in
          </a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/students">&#128100; Students</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/current_sitin">&#128187; Sit-in</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="/admin/sitin/records">&#128196; Records</a>
        </li>

        <li class="nav-item ms-lg-2">
          <a class="btn-logout" href="/logout">&#10148; Log out</a>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ══════════════ MAIN CONTENT ══════════════ -->
<div class="page-wrapper">
    {% block content %}{% endblock %}
</div>

<!-- ══════════════ SIT-IN MODAL ══════════════ -->
<div class="modal fade" id="searchModal" tabindex="-1" aria-labelledby="searchModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title" id="searchModalLabel">&#128187; Sit-In Form</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>

      <div class="modal-body">

        <div class="row g-3">

          <div class="col-12">
            <label class="form-label-sm">ID Number</label>
            <input type="text" id="id_number" class="form-control"
                   placeholder="Enter student ID" onkeyup="fetchStudent()">
          </div>

          <div class="col-12">
            <label class="form-label-sm">Student Name</label>
            <input type="text" id="student_name" class="form-control" readonly
                   placeholder="Auto-filled after ID lookup"
                   style="background:#f8faff;">
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label-sm">Purpose / Language</label>
            <select id="purpose" class="form-select" required>
              <option value="">-- Select Language --</option>
              <option value="C#">C#</option>
              <option value="C">C</option>
              <option value="Java">Java</option>
              <option value="Python">Python</option>
              <option value="PHP">PHP</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label-sm">Lab Room</label>
            <select id="lab_room" class="form-select" required>
              <option value="">-- Select Lab --</option>
              <option value="524">524</option>
              <option value="544">544</option>
              <option value="540">540</option>
              <option value="530">530</option>
            </select>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label-sm">PC Number</label>
            <input type="text" id="pc_number" class="form-control"
                   placeholder="e.g. 12" required>
          </div>

          <div class="col-12 col-md-6">
            <label class="form-label-sm">Remaining Sessions</label>
            <input type="text" id="sessions" class="form-control" readonly
                   placeholder="Auto-filled"
                   style="background:#f8faff;">
          </div>

        </div>

        <p id="message" class="mt-3 text-center fw-semibold small mb-0"></p>

      </div>

      <div class="modal-footer border-0 pt-0 px-4 pb-4">
        <button class="btn btn-outline-secondary rounded-3 px-4"
                data-bs-dismiss="modal">Cancel</button>
        <button class="btn rounded-3 px-4 fw-semibold"
                style="background:#144c94; color:#fff;"
                onclick="startSitIn()">
          &#10003; Confirm Sit-In
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

<script>
function fetchStudent() {
    const id = document.getElementById("id_number").value;
    if (id.length < 3) return;

    fetch("/view_student/" + id)
        .then(res => res.json())
        .then(data => {
            if (!data.error) {
                document.getElementById("student_name").value =
                    data.first_name + " " + data.last_name;
                document.getElementById("sessions").value =
                    data.sessions_remaining;
            } else {
                document.getElementById("student_name").value = "";
                document.getElementById("sessions").value = "";
            }
        });
}

function startSitIn() {
    const id      = document.getElementById("id_number").value.trim();
    const purpose = document.getElementById("purpose").value;
    const pc      = document.getElementById("pc_number").value.trim();
    const lab     = document.getElementById("lab_room").value;
    const msg     = document.getElementById("message");

    if (!id || !purpose || !pc || !lab) {
        msg.innerText = "All fields are required!";
        msg.className = "mt-3 text-center fw-semibold small mb-0 text-danger";
        return;
    }

    fetch("/admin/sitin", {
        method: "POST",
        headers: { "Content-Type": "application/x-www-form-urlencoded" },
        body: new URLSearchParams({ id_number: id, purpose, pc_number: pc, lab_room: lab })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            msg.innerText = data.message;
            msg.className = "mt-3 text-center fw-semibold small mb-0 text-success";
            ["id_number","student_name","sessions","pc_number","purpose","lab_room"]
                .forEach(id => document.getElementById(id).value = "");
        } else {
            msg.innerText = data.message;
            msg.className = "mt-3 text-center fw-semibold small mb-0 text-danger";
        }
    })
    .catch(() => {
        msg.innerText = "Server error. Please try again.";
        msg.className = "mt-3 text-center fw-semibold small mb-0 text-danger";
    });
}
</script>

</body>
</html>
